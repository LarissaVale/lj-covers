<app-header (buscar)="fazerBusca($event)"></app-header>
<div class="container-pai">
    <div class="container-login">
      <h2>Já tenho cadastro</h2>
      <input type="email" placeholder="Email" [(ngModel)]="email" class="form-control mb-2" style="border-radius: 24px; width: 400px;">
      <input type="password" placeholder="Senha" [(ngModel)]="senha" class="form-control mb-3" style="border-radius: 24px;  width: 400px;">
      <button class="btn btn-dark" style="border-radius: 24px;" (click)="entrar()">Entrar</button>
      <p *ngIf="mensagem" class="mt-2 text-dark" style="font-size: 15px;">{{ mensagem }}</p>
      <p class="mt-2 text-dark" style="font-size: 15px; cursor: pointer;">Esqueci minha senha</p>
    </div>

    <div class="container-cadastro">
      <h2>Ainda não tenho cadastro</h2>
      <button (click)="irParaCadastro()" class="btn btn-outline-dark mt-3">Clique aqui</button>
    </div>

</div>
